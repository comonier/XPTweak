# ==============================================================================
# XPTweak Configuration File - COMPLETE VERSION
# ==============================================================================

# Language file to use. Options: en, pt, es, ru
language: "en"

# Feature: Drop XP Bottle on Death
# If true, players drop a custom bottle with 100% of their XP upon death.
drop-xp-bottle-on-death: true

# ==============================================================================
# DATABASE SETTINGS
# ==============================================================================
# Choose where the plugin should store transaction logs and data.
# 
# OPTION 1: SQLITE (Default) - Local file (database.db).
# OPTION 2: MYSQL - External server (Ideal for networks).
#
# EXAMPLE FOR MYSQL SETUP:
# type: "MYSQL"
# host: "127.0.0.1"
# port: 3306
# name: "minecraft_db"
# user: "admin"
# password: "password"
# ==============================================================================
database:
  type: "SQLITE"
  host: "localhost"
  port: 3306
  name: "xptweak"
  user: "root"
  password: ""

# ==============================================================================
# DISCORD WEBHOOKS
# Reports events to your Discord channels. 
# Leave the field as "NONE" or empty to disable a specific report.
# ==============================================================================
webhooks:
  donations: "NONE"
  auctions: "NONE"
  xp-rain: "NONE"

# ==============================================================================
# AUCTION SETTINGS
# ==============================================================================
# Time in seconds for the auction to end if no one bids.
auction-time: 10
# If true, each new bid reduces the remaining time by 1 second.
auction-regressive: true

# ==============================================================================
# XP RAIN SETUP GUIDE (WorldGuard + WorldEdit)
# ==============================================================================
# To make the XP Rain work independently of players being online:
# 1. Use the WorldEdit wand (//wand) to select two corners.
# 2. Define a region: /rg define <region_name>
# 3. Add the custom flag: /rg flag <region_name> xpt-rain allow
# 4. Set the exact region name in the 'region-name' field below.
#
# ANNOUNCEMENT LOGIC (Controlled by messages_XX.yml):
# - DISCORD: Sent at 30, 15, 10, and 5 minutes before the event.
# - IN-GAME: Sent at 30, 15, 10, 5, 4, 3, 2, 1 minutes and 30 seconds.
# ==============================================================================
xp-rain:
  enabled: true
  
  # Set to false to test the rain logic without broadcasting chat messages.
  # Note: Discord webhooks will still be sent if a URL is configured above.
  announcement-enabled: true
  
  # Scheduled times in 24h format.
  times:
    - "06:00"
    - "08:00"
    - "10:00"
    - "12:00"
    - "14:00"
    - "16:00"
    - "18:00"
    - "20:00"
    - "22:00"
    
  # World and WorldGuard Region name.
  world: "world"
  region-name: "xp_arena"
  

  # NEW LOGIC v1.3: XP and Entities Control
  # To avoid lag, keep total-orbs low (e.g., 100-500).
  # The plugin will divide total-xp-points by total-orbs.
  # 
  # REFERENCE FOR XP POINTS:
  # Level 30  ≈ 1,395 points
  # Level 50  ≈ 5,345 points
  # Level 100 ≈ 30,970 points
  # Level 500 ≈ 1,010,000 points
  # Level 1000 ≈ 4,200,000 points
  total-xp-points: 1010000
  
  # Total amount of XP orbs to spawn during the scheduled rain.
  total-orbs: 300

  # NEW LOGIC v1.2: Location instruction variable {instruction}
  # Type here the warning for players to teleport to the XP Rain location.
  # Example: 'Type /warp xp' or 'Go to the main arena'
  location-instruction: "Type /warp xp"

# ==============================================================================
# CUSTOMIZABLE HELP MENU
# This menu is now handled by language files (messages_XX.yml).
