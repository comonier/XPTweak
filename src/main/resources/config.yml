#   ...

# ==============================================================================
# PERMISSIONS REFERENCE
# ==============================================================================
# [USER PERMISSIONS]
# xptweak.user.base    - Access to /xpt help, /xpt accept, /xpt time and /xpt inspect (Default: true)
# xptweak.user.store   - Access to /xpt max, /xpt lvl and /xpt inv (Default: true)
# xptweak.user.give    - Access to /xpt give (Default: true)
# xptweak.user.auction - Access to /xpt auc and /xpt bid (Default: true)
# xptweak.user.custom  - Access to /xptc (Custom NBT Bottles) (Default: OP)
#
# [ADMIN PERMISSIONS]
# xptweak.admin.reload - Access to /xpt reload (Default: OP)
# xptweak.admin.rain   - Access to /xpt rain manual command (Default: OP)
# ==============================================================================
